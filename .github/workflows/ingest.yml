name: Ingest (TypeScript)

on:
  push:
    branches: [main]
    paths:
      - 'ingest/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ingest.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ingest/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ingest.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d  # v6.0.5
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      # Lint / format / type-check live in `.github/workflows/lint.yml`
      # (alongside the viewer checks); this workflow runs only the build
      # and unit-test steps.
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Unit tests
        run: pnpm --filter papyri-ingest run test
      - name: Build
        run: pnpm --filter papyri-ingest run build
